<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5e8c9" />
  <meta name="description" content="마음이 답답할 때 잠시 머물며 생각을 적고 비우는 작은 창가 공간" />
  <title>마음쉼 — 생각을 잠시 내려놓는 곳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=6" />
  <link rel="stylesheet" href="mobile.css?v=6" />
  <link rel="stylesheet" href="birds.css?v=6" />
</head>
<body>
  <main class="room" aria-label="햇살 드는 창가의 조용한 방">
    <div class="sunbeam sunbeam-one"></div>
    <div class="sunbeam sunbeam-two"></div>

    <header class="intro">
      <p id="greeting">오늘도 여기까지 잘 왔어요.</p>
      <h1>마음쉼</h1>
      <span>지금은 아무것도 해결하지 않아도 괜찮아요.</span>
    </header>

    <section class="window" aria-label="창문">
      <div class="sky">
        <span class="cloud c1"></span><span class="cloud c2"></span>
        <span class="bird bird-1" aria-hidden="true">
          <svg viewBox="0 0 96 64" role="img">
            <path d="M7 35c12-2 20-8 27-18 2 9 8 15 17 19 8-8 18-13 31-14-6 8-13 14-21 18 8 2 15 6 21 12-14 1-25-2-34-9-10 7-23 9-41 4 8-3 14-7 18-12-6 2-12 2-18 0z" fill="#536976"/>
            <circle cx="62" cy="31" r="2.2" fill="#283840"/>
            <path d="M82 34l10 4-11 3z" fill="#d7a85f"/>
          </svg>
        </span>
        <span class="bird bird-2" aria-hidden="true">
          <svg viewBox="0 0 96 64" role="img">
            <path d="M7 35c12-2 20-8 27-18 2 9 8 15 17 19 8-8 18-13 31-14-6 8-13 14-21 18 8 2 15 6 21 12-14 1-25-2-34-9-10 7-23 9-41 4 8-3 14-7 18-12-6 2-12 2-18 0z" fill="#6f8791"/>
            <circle cx="62" cy="31" r="2.2" fill="#283840"/>
            <path d="M82 34l10 4-11 3z" fill="#d7a85f"/>
          </svg>
        </span>
      </div>
      <div class="frame-v"></div><div class="frame-h"></div>
      <div class="curtain left"></div><div class="curtain right"></div>
    </section>

    <section class="desk" aria-label="책상">
      <div class="plant" aria-hidden="true"><i></i><i></i><i></i><b></b></div>
      <button class="mug" id="soundBtn" aria-pressed="false" title="빗소리 켜기">
        <span class="steam s1"></span><span class="steam s2"></span>☕
      </button>

      <div class="notebook-wrap">
        <div class="notebook">
          <div class="rings" aria-hidden="true">○ ○ ○ ○ ○ ○</div>
          <label for="thought">지금 마음에 걸리는 생각을 내려놓아 보세요.</label>
          <textarea id="thought" maxlength="240" placeholder="누구에게도 보여주지 않아도 돼요…"></textarea>
          <div class="note-footer"><span id="count">0 / 240</span><button id="foldBtn">접어서 내려놓기</button></div>
        </div>
        <div class="pen" aria-hidden="true"><span></span></div>
      </div>

      <button class="trash" id="trashBtn" aria-label="적은 생각을 쓰레기통에 버리기" title="생각 버리기">
        <span class="lid"></span><span class="bin">▥</span>
      </button>
    </section>

    <nav class="calm-tools" aria-label="마음 진정 도구">
      <button id="breatheBtn">숨 한번 고르기</button>
      <button id="promptBtn">한 문장 받기</button>
      <button id="clearBtn">모두 비우기</button>
    </nav>

    <section class="breathing" id="breathing" aria-live="polite" hidden>
      <div class="breath-circle"><span id="breathText">천천히 들이마셔요</span></div>
      <button id="stopBreath">그만하기</button>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <canvas id="rainCanvas" aria-hidden="true"></canvas>
  </main>
  <script src="app.js?v=6"></script>
</body>
</html>
