<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08090d" />
  <meta name="description" content="버리고 싶은 마음과 기억하고 싶은 성공을 나누어 적는 두 권의 마음 노트" />
  <title>마음쉼 — 버림노트와 성공노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
  <main class="app-shell" aria-label="마음을 정리하는 두 권의 노트">
    <p class="quiet-copy">오늘의 마음은 어디에 적을까요?</p>

    <section class="bookshelf" aria-label="노트 선택">
      <button class="book-button discard-book" type="button" data-notebook="discard" aria-label="버림노트 열기">
        <span class="book-visual">
          <img src="assets/vendor/openmoji/red-book.svg" alt="" aria-hidden="true" />
          <strong>버림노트</strong>
        </span>
        <span class="book-caption">적고 · 비우기</span>
      </button>

      <button class="book-button success-book" type="button" data-notebook="success" aria-label="성공노트 열기">
        <span class="book-visual">
          <img src="assets/vendor/openmoji/green-book.svg" alt="" aria-hidden="true" />
          <strong>성공노트</strong>
        </span>
        <span class="book-caption">적고 · 기억하기</span>
      </button>
    </section>

    <button class="trash-button" id="trashBtn" type="button" aria-label="버림노트 비우기">
      <img src="assets/vendor/openmoji/trash.svg" alt="" aria-hidden="true" />
      <span>휴지통</span>
    </button>
  </main>

  <div class="editor-layer" id="editorLayer" hidden>
    <section class="editor-card" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
      <button class="close-button" id="closeEditor" type="button" aria-label="노트 닫기">×</button>
      <p class="editor-kicker" id="editorKicker"></p>
      <h1 id="editorTitle"></h1>
      <textarea id="noteInput" maxlength="500" placeholder="마음에 있는 말을 천천히 적어보세요."></textarea>
      <div class="editor-actions">
        <span id="noteCount">0 / 500</span>
        <button id="primaryAction" type="button"></button>
      </div>

      <section class="success-history" id="successHistory" hidden aria-label="저장된 성공 기록">
        <h2>내가 해낸 일</h2>
        <div id="successList"></div>
      </section>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js?v=12"></script>
</body>
</html>
